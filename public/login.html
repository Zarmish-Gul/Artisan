<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ARTISAN.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['"Inter"', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-stone-200 font-sans text-stone-900">

    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white w-[450px] max-w-full shadow-2xl rounded-lg overflow-hidden border border-stone-100">
            
            <div class="p-10 md:p-14 flex flex-col justify-center">
                <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
                    <div class="text-center mb-10">
                        <h2 class="font-serif text-4xl text-stone-900 mb-3">Sign In</h2>
                        <div class="w-12 h-[1px] bg-stone-300 mx-auto mb-3"></div>
                        <p class="text-[10px] uppercase tracking-[0.3em] text-stone-400">
                            Artisan Admin Portal
                        </p>
                    </div>

                    <div class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[9px] uppercase tracking-widest text-stone-400 font-bold ml-1">
                                Username
                            </label>
                            <input 
                                type="text" 
                                id="username"
                                class="w-full p-4 bg-stone-50 border border-stone-100 focus:border-stone-900 outline-none transition-all text-sm"
                                required
                            />
                        </div>

                        <div class="space-y-1">
                            <label class="text-[9px] uppercase tracking-widest text-stone-400 font-bold ml-1">
                                Password
                            </label>
                            <input 
                                type="password" 
                                id="password"
                                class="w-full p-4 bg-stone-50 border border-stone-100 focus:border-stone-900 outline-none transition-all text-sm"
                                required
                            />
                        </div>
                    </div>

                    <button 
                        type="submit"
                        class="w-full bg-stone-900 text-white py-4 font-bold uppercase text-[10px] tracking-[0.2em] hover:bg-stone-800 transition-all shadow-lg active:scale-[0.98]"
                    >
                        Sign In
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-stone-100 text-center">
                    <div class="text-[10px] text-stone-300 uppercase tracking-widest mb-4">OR</div>
                    <button 
                        type="button"
                        onclick="continueAsGuest()" 
                        class="text-[11px] uppercase tracking-[0.2em] text-stone-500 hover:text-stone-900 transition-colors font-semibold"
                    >
                        Continue as Guest
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Simple admin check
            if (user === 'admin' && pass === 'admin') {
                localStorage.setItem('userRole', 'admin');
                window.location.href = 'admin.html'; // Redirect to dashboard
            } else {
                // Incorrect login - act as guest
                localStorage.setItem('userRole', 'guest');
                window.location.href = 'index.html'; 
            }
        }

        function continueAsGuest() {
            localStorage.setItem('userRole', 'guest');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
