<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | ARTISAN.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { cream: '#F4EFE6', brown: '#4A3022', accent: '#855E42' } },
                    fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['"Inter"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .animate-fadeIn { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-white font-sans text-stone-900">

   <nav class="flex flex-col md:flex-row justify-between items-center px-6 md:px-10 py-6 bg-stone-900 border-b border-stone-800 sticky top-0 z-50">
        <a href="index.html" class="text-2xl font-serif font-bold text-stone-300 tracking-tight mb-4 md:mb-0 hover:text-white transition-colors">
            ARTISAN.
        </a>
        
        <div class="flex flex-wrap justify-center gap-4 md:gap-8 text-stone-400 font-medium text-xs uppercase tracking-widest">
            <a href="index.html" class="hover:text-stone-200 transition-colors">Home</a>
            <a href="shop.html" class="hover:text-stone-200 transition-colors">Shop</a>
            <a href="blog.html" class="hover:text-stone-200 transition-colors">Journal</a>
            
            <a id="nav-dashboard" href="admin.html" class="hidden text-amber-500 hover:text-amber-200 transition-colors font-bold">Dashboard</a>
            
            <button id="nav-logout" onclick="logout()" class="hidden text-red-400 hover:text-red-300 transition-colors uppercase text-[10px] tracking-widest font-bold">
                Logout
            </button>

            <a id="nav-login" href="login.html" class="hover:text-stone-200 transition-colors">Login</a>
        </div>

        <a href="cart.html" class="text-stone-300 font-medium text-sm mt-4 md:mt-0 hover:text-white flex items-center gap-2">
            <span class="uppercase text-[10px] tracking-widest">Cart</span>
            <span id="nav-cart-count" class="bg-stone-800 px-2 py-0.5 rounded-full text-xs">(0)</span>
        </a>
    </nav>

    <script>
        function updateNavbar() {
            const role = localStorage.getItem('userRole');
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            // Update Cart Count
            const cartCount = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            const cartCountElement = document.getElementById('nav-cart-count');
            if (cartCountElement) cartCountElement.innerText = `(${cartCount})`;

            // Show/Hide Admin Links
            if (role === 'admin') {
                const dashboardLink = document.getElementById('nav-dashboard');
                const logoutBtn = document.getElementById('nav-logout');
                const loginLink = document.getElementById('nav-login');
                if (dashboardLink) dashboardLink.classList.remove('hidden');
                if (logoutBtn) logoutBtn.classList.remove('hidden');
                if (loginLink) loginLink.classList.add('hidden');
            } else if (role === 'guest') {
                const logoutBtn = document.getElementById('nav-logout');
                const loginLink = document.getElementById('nav-login');
                if (logoutBtn) logoutBtn.classList.remove('hidden');
                if (loginLink) loginLink.classList.add('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('userRole');
            localStorage.removeItem('userEmail');
            window.location.href = 'index.html';
        }

        // Call updateNavbar on load
        window.addEventListener('DOMContentLoaded', updateNavbar);
    </script>

    <div class="min-h-screen animate-fadeIn pb-20">
        <div class="max-w-7xl mx-auto px-6 pt-16">
            
            <div class="flex justify-between items-center mb-8">
                <a href="shop.html" class="text-[10px] uppercase tracking-widest text-stone-400 hover:text-stone-900 flex items-center gap-2 transition-colors">
                    ← Back to Shop
                </a>
                <button id="clear-btn" onclick="clearCart()" class="hidden text-red-600 px-4 py-2 text-[10px] uppercase tracking-widest font-bold hover:underline">
                    Clear Cart
                </button>
            </div>

            <h1 class="text-4xl font-serif text-stone-900 mb-12 uppercase tracking-tight">Your Cart</h1>

            <div id="empty-cart" class="hidden py-20 text-center border-t border-stone-100">
                <p class="text-stone-400 font-serif italic mb-8">Your cart is currently empty.</p>
                <a href="shop.html" class="bg-stone-900 text-white px-8 py-4 rounded-xl text-xs uppercase tracking-widest font-bold hover:bg-stone-700 transition-all">
                    Start Shopping
                </a>
            </div>

            <div id="cart-content" class="flex flex-col lg:flex-row gap-16">
                <div class="flex-1">
                    <div id="cart-items-list" class="border-t border-stone-100">
                        </div>
                </div>

                <div class="w-full lg:w-[400px]">
                    <div class="bg-stone-50 rounded-2xl p-8 sticky top-24">
                        <h2 class="text-[11px] uppercase tracking-[0.2em] font-bold text-stone-900 mb-8 pb-4 border-b border-stone-200/50">Cart Totals</h2>
                        <div class="space-y-4 mb-8">
                            <div class="flex justify-between text-sm">
                                <span class="text-stone-500">Subtotal</span>
                                <span id="subtotal" class="text-stone-900 font-bold">$0.00</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-stone-500">Shipping</span>
                                <span class="text-stone-900 font-medium italic">Calculated at Checkout</span>
                            </div>
                            <div class="flex justify-between items-end pt-4 border-t border-stone-200/50">
                                <span class="text-stone-900 font-serif text-xl">Total</span>
                                <span id="total" class="text-stone-900 font-bold text-2xl">$0.00</span>
                            </div>
                        </div>
                        <button onclick="proceedToCheckout()" class="w-full bg-stone-900 text-white py-5 rounded-2xl text-[11px] uppercase tracking-widest font-bold hover:bg-stone-700 transition-all shadow-lg active:scale-95">
                            Proceed to Checkout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            const emptyState = document.getElementById('empty-cart');
            const content = document.getElementById('cart-content');
            const clearBtn = document.getElementById('clear-btn');

            if (!cart || cart.length === 0) {
                if (emptyState) emptyState.classList.remove('hidden');
                if (content) content.classList.add('hidden');
                if (clearBtn) clearBtn.classList.add('hidden');
                updateNavbar();
                return;
            }

            if (emptyState) emptyState.classList.add('hidden');
            if (content) content.classList.remove('hidden');
            if (clearBtn) clearBtn.classList.remove('hidden');

            let subtotal = 0;

            if (list) {
                list.innerHTML = cart.map(item => {
                    // Get product properties with fallbacks
                    const productId = item.id;
                    const productName = item.name || item.title || 'Artisan Piece';
                    const productImage = item.img || item.image || 'https://placehold.co/400x400/F4EFE6/4A3022?text=ARTISAN';
                    const productCategory = item.category || 'Handcrafted';
                    const productPrice = parseFloat(item.price) || 0;
                    const productQty = item.quantity || 1;
                    const itemTotal = productPrice * productQty;
                    subtotal += itemTotal;
                    
                    return `
                        <div class="flex items-center gap-6 py-8 border-b border-stone-100 group relative">
                            <button onclick="removeFromCart(${productId})" class="absolute left-[-30px] opacity-0 group-hover:opacity-100 text-stone-300 hover:text-red-500 transition-all">✕</button>
                            
                            <div class="w-24 h-24 bg-stone-50 rounded-xl overflow-hidden border border-stone-100 shrink-0">
                                <img src="${productImage}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400/F4EFE6/4A3022?text=ARTISAN'" alt="${productName}" />
                            </div>

                            <div class="flex-1 flex flex-col md:flex-row md:items-center justify-between gap-4">
                                <div>
                                    <h3 class="text-[11px] uppercase tracking-widest font-bold text-stone-900 mb-1">${escapeHtml(productName)}</h3>
                                    <p class="text-[10px] text-stone-400 uppercase">${escapeHtml(productCategory)}</p>
                                </div>

                                <div class="flex items-center gap-8">
                                    <div class="flex items-center border border-stone-200 rounded-lg bg-white">
                                        <button onclick="updateQty(${productId}, -1)" class="px-3 py-1 text-stone-400 hover:text-stone-900 transition-colors">–</button>
                                        <span class="px-4 py-1 text-xs font-bold border-x border-stone-200 w-10 text-center">${productQty}</span>
                                        <button onclick="updateQty(${productId}, 1)" class="px-3 py-1 text-stone-400 hover:text-stone-900 transition-colors">+</button>
                                    </div>
                                    <p class="text-sm font-bold text-stone-900 w-16 text-right">$${itemTotal.toFixed(2)}</p>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            const subtotalElement = document.getElementById('subtotal');
            const totalElement = document.getElementById('total');
            if (subtotalElement) subtotalElement.innerText = `$${subtotal.toFixed(2)}`;
            if (totalElement) totalElement.innerText = `$${subtotal.toFixed(2)}`;
            
            // Update navbar cart count
            updateNavbar();
        }

        // Helper function to prevent XSS attacks
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function updateQty(id, change) {
            const item = cart.find(i => i.id === id);
            if (item) {
                const newQty = (item.quantity || 1) + change;
                if (newQty >= 1) {
                    item.quantity = newQty;
                    saveAndRender();
                }
            }
        }

        function removeFromCart(id) {
            if (confirm('Remove this item from cart?')) {
                cart = cart.filter(i => i.id !== id);
                saveAndRender();
            }
        }

        function clearCart() {
            if (confirm("Are you sure you want to empty your cart?")) {
                cart = [];
                saveAndRender();
            }
        }

        function proceedToCheckout() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            window.location.href = 'checkout.html';
        }

        function saveAndRender() {
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        // Make functions global
        window.updateQty = updateQty;
        window.removeFromCart = removeFromCart;
        window.clearCart = clearCart;
        window.proceedToCheckout = proceedToCheckout;

        // Initial render
        window.addEventListener('DOMContentLoaded', function() {
            renderCart();
        });
        
        // Listen for cart updates from other tabs/pages
        window.addEventListener('storage', function(e) {
            if (e.key === 'cart') {
                cart = JSON.parse(e.newValue) || [];
                renderCart();
            }
        });
    </script>
</body>
</html>
